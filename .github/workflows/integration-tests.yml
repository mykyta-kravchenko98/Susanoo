name: Integration Tests

on:
  pull_request:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/integration-tests.yml"
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/integration-tests.yml"

jobs:
  integration:
    name: Processor integration tests (LocalStack)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Run integration tests
        run: go test -tags=integration ./cmd/processor/... -v
